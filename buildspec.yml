version: 0.2
phases:
  pre_build:
    commands:
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - echo "Logging in to AWS ECR......"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com
  build:
    commands:
      - echo "Building the Docker Image....."
      - docker build -t $IMAGE_REPO_NAME .
  post_build:
    commands:
      - echo "Tagging and pushing the docker image to ecr...."
      - docker tag $IMAGE_REPO_NAME:latest $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:latest

artifacts:
  files:
    - appspec.yml
    - scripts/**/*